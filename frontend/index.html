<!DOCTYPE html>
<html lang="es">

<head>

    <script type="module">
        import './src/js/modules/auth/guard.js';
        // Esto asegura que si no hay token, el resto no se carga visualmente o te expulsa.
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>


    <meta charset="utf-8" />
    <title>NUMA Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" type="image/png" sizes="16x16" href="/html/img/logo.png">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js" crossorigin="anonymous"></script>
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBu4L9CermVPfjvYhSa6WXCQAzyA7pdBFo&libraries=geometry,places"></script>
    <style>
        /* Aseguramos que el mapa tenga altura */
        #draw-map {
            width: 100%;
            height: 100%;
            min-height: 500px;
            /* Fallback */
            position: relative;
        }

        /* Estilos personalizados para info windows de Google Maps */
        .gm-style .gm-style-iw {
            font-family: inherit;
            color: #333;
        }
    </style>
    <script type="module" src="/src/js/router.js"></script>
</head>

<body>
    <nav id="sidebar">
        <div class="sidebar-menu">
            <ul>
                <li><a href="/" data-link><i class="fa-solid fa-home"></i><span>Principal</span></a></li>
                <li><a href="/rutas" data-link><i class="fa-solid fa-route"></i><span>Rutas</span></a></li>
                <li><a href="#" onclick="alert('¡Módulo de Clientes disponible proximamente!'); return false;"><i
                            class="fa-solid fa-user"></i><span>Clientes</span></a></li>
                <li><a href="/vehiculos" data-link><i class="fa-solid fa-truck"></i><span>Vehículos</span></a></li>
                <li><a href="/choferes" data-link><i class="fa fa-id-card"></i><span>Choferes</span></a></li>
                <li><a href="/reportes" data-link><i class="fa-solid fa-file-alt"></i><span>Reportes</span></a></li>
                <li><a href="/settings" data-link><i class="fa fa-cog"></i><span>Configuraciones</span></a></li>
            </ul>
        </div>

        <div class="sidebar-footer">
            <a href="#sing-out" id="btn-logout" class="logout-link">
                <i class="fa fa-sign-out"></i><span>Salir</span>
            </a>

            <div class="user-profile-card">
                <div class="user-avatar">
                    <i class="fa-solid fa-circle-user"></i>
                    <span id="status-dot" class="status-indicator"></span>
                </div>
                <div class="user-details">
                    <p id="user-name-display" class="u-name">Cargando...</p>
                    <p id="license-key-display" class="u-license">...</p>
                    <div class="u-status-row">
                        <span id="license-status-text">--</span>
                        <span id="license-days-left" class="u-days">(--)</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div id="main-content">
        <div id="app-content"></div>
    </div>

    <div id="modal-no-base" class="modalB" style="display: none;">
        <div class="modal-content">
            <h3>⚠️ Base Operativa no detectada</h3>
            <p>No se ha configurado la ubicación de la base.</p>
            <div class="modal-buttons">
                <button id="btn-go-config" class="btn-primary">Configurar</button>
                <button id="btn-close-modal" class="btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/js/app.js"></script>

</body>

</html>
